services:
  postgres-auth:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: auth_service_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_service_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5433:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data

  postgres-customer:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: customer_service_db
      POSTGRES_USER: customer_user
      POSTGRES_PASSWORD: customer_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer_user -d customer_service_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5434:5432"
    volumes:
      - postgres-customer-data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:3.9.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    ports:
      - "9094:9094"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  payment-profile-service:
    build:
      context: ./payment-profile-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 4001
      GRPC_SERVER_PORT: 9001
    ports:
      - "4001:4001"
      - "9001:9001"

  analytics-service:
    build:
      context: ./analytics-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 4002
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "4002:4002"

  auth-service:
    build:
      context: ./auth-service
    depends_on:
      postgres-auth:
        condition: service_healthy
    environment:
      SERVER_PORT: 4005
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env or the shell environment}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_service_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_password
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: 60000
    ports:
      - "4005:4005"

  customer-service:
    build:
      context: ./customer-service
    depends_on:
      postgres-customer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-profile-service:
        condition: service_started
    environment:
      SERVER_PORT: 4000
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-customer:5432/customer_service_db
      SPRING_DATASOURCE_USERNAME: customer_user
      SPRING_DATASOURCE_PASSWORD: customer_password
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: 60000
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BILLING_SERVICE_ADDRESS: payment-profile-service
      BILLING_SERVICE_GRPC_PORT: 9001
    ports:
      - "4000:4000"

  api-gateway:
    build:
      context: ./api-gateway
    depends_on:
      auth-service:
        condition: service_started
      customer-service:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 4004
      AUTH_SERVICE_URL: http://auth-service:4005
      CUSTOMER_SERVICE_URL: http://customer-service:4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "4004:4004"

volumes:
  postgres-auth-data:
  postgres-customer-data:
