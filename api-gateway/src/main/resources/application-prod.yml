server:
  port: 4004

auth:
  service:
    url: http://host.docker.internal:4005

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service-route
          uri: http://host.docker.internal:4005
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: customer-service-route
          uri: http://host.docker.internal:4000
          predicates:
            - Path=/api/customers/**
          filters:
            - StripPrefix=1
            - JwtValidation

        - id: api-docs-customer-route
          uri: http://host.docker.internal:4000
          predicates:
            - Path=/api-docs/customers
          filters:
            - RewritePath=/api-docs/customers,/v3/api-docs

        - id: api-docs-auth-route
          uri: http://host.docker.internal:4005
          predicates:
            - Path=/api-docs/auth
          filters:
            - RewritePath=/api-docs/auth,/v3/api-docs
