syntax = "proto3";

option java_multiple_files = true;
option java_package = "billing";
option java_outer_classname = "PaymentProfileServiceOuterClass";

service PaymentProfileService {
  rpc CreatePaymentProfile (PaymentProfileRequest) returns (PaymentProfileResponse);
}

message PaymentProfileRequest {
  string customerId = 1;
  string fullName = 2;
  string email = 3;
}

message PaymentProfileResponse {
  string paymentProfileId = 1;
  string status = 2;
}
