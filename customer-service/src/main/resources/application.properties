spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
spring.application.name=customer-service

spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.cache.cache-names=customers,customerSearch
spring.cache.redis.time-to-live=${SPRING_CACHE_REDIS_TIME_TO_LIVE:5m}
spring.cache.redis.cache-null-values=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer

server.port=${SERVER_PORT:4000}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:customer-service-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

billing.service.address=${BILLING_SERVICE_ADDRESS:localhost}
billing.service.grpc.port=${BILLING_SERVICE_GRPC_PORT:9001}

spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

logging.level.root=info
